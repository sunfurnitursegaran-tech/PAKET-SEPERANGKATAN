    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #1a1a1a;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--white);
            color: var(--black);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header / Logo */
        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: var(--black);
            color: var(--white);
            border-bottom: 4px solid var(--gold);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            letter-spacing: 3px;
        }

        .logo span {
            color: var(--gold);
        }

        /* Container untuk Konten Canva */
        .main-content {
            width: 90%;
            max-width: 500px; /* Ukuran maksimal lebar postingan */
            margin: 3rem 0;
            padding: 10px;
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            background: #fff;
        }

        .description {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .description h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--black);
        }

        .gold-line {
            width: 50px;
            height: 2px;
            background: var(--gold);
            margin: 10px auto;
        }

        /* Styling tambahan untuk link Canva agar tidak merusak estetika */
        .canva-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: var(--gold);
            font-size: 0.8rem;
            font-weight: 600;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            font-size: 0.7rem;
            color: #999;
        }
    </style>
</head>
